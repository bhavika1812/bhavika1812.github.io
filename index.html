<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ritsika 🎂</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffd6ec, #ffe6f7);
  text-align: center;
  overflow: hidden;
}

.screen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: white;
  color: #ff1493;
  font-size: 16px;
  cursor: pointer;
  margin-top: 20px;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  text-align: center;
  margin-top: 15px;
}

#landing { display: flex; }

#cake-area {
  position: relative;
  height: 100vh;
  background: linear-gradient(#ffe6f7, #ffcce6);
}

.cake {
  font-size: 120px;
}

.flame {
  font-size: 40px;
  position: relative;
  top: -120px;
}

#gift {
  font-size: 100px;
  cursor: pointer;
  margin-top: 30px;
}

#letter {
  display: none;
  background: #fdf5e6;
  width: 70%;
  max-width: 500px;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
  margin-top: 20px;
  font-family: "Courier New", cursive;
}
</style>
</head>

<body>

<!-- Screen 1 -->
<div id="landing" class="screen">
  <h1>Enter here Ritsi 🎀</h1>
  <button onclick="goToQuestion()">Enter</button>
</div>

<!-- Screen 2 -->
<div id="question" class="screen">
  <h2>Wait.</h2>
  <h3>Important Question.</h3>
  <p>Rate Bhavika on a scale of 1–10</p>
  <input type="number" id="rating" min="1" max="10">
  <button onclick="checkAnswer()">Submit</button>
  <p id="response"></p>
</div>

<!-- Screen 3 -->
<div id="cake-area" class="screen">
  <div class="cake">🎂</div>
  <div class="flame" id="flame">🔥</div>
  <h2 id="countdown"></h2>
</div>

<!-- Screen 4 -->
<div id="gift-screen" class="screen">
  <h2>Open your gift 🎁</h2>
  <div id="gift" onclick="openGift()">🎁</div>

  <div id="letter">
    <p>
      hello ritsi happy birthday ilysm i hope you have the sweetest and nicest birthday today and im so happy that youre getting old i wish you all the best mwah
    </p>
    <p>— Bhavika 🤟🏻</p>
  </div>
</div>

<script>
function goToQuestion() {
  document.getElementById("landing").style.display = "none";
  document.getElementById("question").style.display = "flex";
}

function checkAnswer() {
  let value = document.getElementById("rating").value;
  let response = document.getElementById("response");

  if (value == 10) {
    document.getElementById("question").style.display = "none";
    startCakeScene();
  } else {
    response.innerHTML = "Uh oh. You don’t seem like Ritsika. She would never say that. Bye.";
  }
}

function startCakeScene() {
  let cake = document.getElementById("cake-area");
  cake.style.display = "flex";

  let countdown = document.getElementById("countdown");
  let numbers = ["Blow it in 3...", "2...", "1..."];
  let i = 0;

  let interval = setInterval(() => {
    countdown.innerHTML = numbers[i];
    i++;
    if (i === numbers.length) {
      clearInterval(interval);
      setTimeout(() => {
        document.getElementById("flame").innerHTML = "";
        countdown.innerHTML = "Make a wish...";
        setTimeout(() => {
          cake.style.display = "none";
          document.getElementById("gift-screen").style.display = "flex";
        }, 10000);
      }, 1000);
    }
  }, 1000);
}

function openGift() {
  document.getElementById("letter").style.display = "block";
}
</script>

</body>
</html>
