<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Ritsika 🎀</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: linear-gradient(to bottom right, #ffd6eb, #ffc0cb);
  text-align: center;
  overflow: hidden;
}

.screen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 20px;
  border: none;
  background-color: hotpink;
  color: white;
  cursor: pointer;
  margin-top: 15px;
}

button:hover {
  background-color: deeppink;
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
  color: pink;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* Cake Styling */
.cake {
  font-size: 160px;
}

.candle {
  font-size: 60px;
  position: relative;
  top: 30px;
}

.parchment {
  background: #f8e8c8;
  padding: 30px;
  width: 60%;
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
  font-size: 20px;
}
</style>
</head>

<body>

<!-- MUSIC -->
<iframe id="bgMusic"
  width="0" height="0"
  src="https://www.youtube.com/embed/cVAa0JH381Y?enablejsapi=1"
  frameborder="0"
  allow="autoplay"
></iframe>

<!-- LANDING -->
<div class="screen" id="landing" style="display:flex;">
  <h1>Enter here Ritsi 🎀</h1>
  <button onclick="startExperience()">Enter</button>
</div>

<!-- QUESTION -->
<div class="screen" id="question">
  <h2>wait...</h2>
  <h3>imp ques 🤨</h3>
  <p>rate Bhavika on a scale of 1–10</p>
  <input type="text" id="rating" placeholder="type here">
  <button onclick="checkAnswer()">Submit</button>
</div>

<!-- CAKE SCENE -->
<div class="screen" id="cakeScene">
  <div class="candle" id="flame">🕯️</div>
  <div class="cake">🎂</div>
  <h2 id="countdown"></h2>
</div>

<!-- WISH -->
<div class="screen" id="wishScene">
  <h2>Make a wish 🎀</h2>
</div>

<!-- GIFT -->
<div class="screen" id="giftScene">
  <h2>Open your gift 🎁</h2>
  <button onclick="openGift()">Open</button>
</div>

<!-- LETTER -->
<div class="screen" id="letterScene">
  <div class="parchment">
    <h2>For Ritsika 🥺</h2>
    <p>
      hello ritsi happy birthday ilysm  
      i hope you have the sweetest and nicest birthday today  
      and im so happy that youre getting old  
      i wish you all the best  
      mwah 💗
    </p>
    <p>— Bhavika 🎀</p>
  </div>
</div>

<script>

function startExperience() {
  document.getElementById("landing").style.display = "none";
  document.getElementById("question").style.display = "flex";

  // Start music after click
  document.getElementById("bgMusic").src += "&autoplay=1";
}

function checkAnswer() {
  let value = document.getElementById("rating").value;
  if (value !== "10") {
    alert("uhoh you dont seem ritsika coz she would never say that bye 😝");
  } else {
    document.getElementById("question").style.display = "none";
    showCake();
  }
}

function showCake() {
  document.getElementById("cakeScene").style.display = "flex";

  let count = 3;
  let countdownText = document.getElementById("countdown");

  let timer = setInterval(function() {
    countdownText.innerText = "Blow the candle in " + count + "...";
    count--;
    if (count < 0) {
      clearInterval(timer);
      document.getElementById("flame").innerText = "🕯";
      countdownText.innerText = "";
      setTimeout(showWish, 1000);
    }
  }, 1000);
}

function showWish() {
  document.getElementById("cakeScene").style.display = "none";
  document.getElementById("wishScene").style.display = "flex";

  setTimeout(function() {
    document.getElementById("wishScene").style.display = "none";
    document.getElementById("giftScene").style.display = "flex";
  }, 10000);
}

function openGift() {
  document.getElementById("giftScene").style.display = "none";
  document.getElementById("letterScene").style.display = "flex";
}

/* Floating hearts generator */
setInterval(function() {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "💗";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (20 + Math.random() * 30) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}, 500);

</script>

</body>
</html>
